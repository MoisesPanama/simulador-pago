<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Simulador de Pago{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="topbar">
    <a class="brand" href="{{ url_for('pedido') }}">
        <span class="brand-mark">◆</span> Simulador<span class="brand-accent">Pago</span>
    </a>
    <nav>
        <a href="{{ url_for('pedido') }}" class="{{ 'active' if request.endpoint=='pedido' else '' }}">Nuevo pago</a>
        <a href="{{ url_for('admin') }}" class="{{ 'active' if request.endpoint in ['admin'] else '' }}">Panel admin</a>
    </nav>
</header>
<main class="content">
    {% block content %}{% endblock %}
</main>
<footer class="footer">
    Adapter + ISP + Facade &mdash; UTEQ · Diseño y Arquitectura de Software
</footer>
</body>
</html>
